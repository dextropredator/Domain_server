<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudSync App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background: #fff; color: #333; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 100px 20px; text-align: center; }
        h1 { font-size: 3.5em; margin: 0 0 20px 0; }
        p { font-size: 1.2em; max-width: 600px; margin: 0 auto 30px auto; opacity: 0.9; }
        .btn { background: #ffffff; color: #764ba2; padding: 15px 30px; font-size: 1.1em; font-weight: bold; text-decoration: none; border-radius: 30px; display: inline-block; transition: transform 0.2s; }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .features { display: flex; justify-content: center; gap: 40px; padding: 60px 20px; flex-wrap: wrap; }
        .feature-card { text-align: center; max-width: 300px; padding: 20px; border: 1px solid #eee; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="hero">
        <h1>Sync Everything. Instantly.</h1>
        <p>The fastest, most secure way to manage your files across all your devices, hosted on a custom Java backend.</p>
        <a href="#" class="btn">Start Free Trial</a>
    </div>
    <div class="features">
        <div class="feature-card">
            <h3>Blazing Fast</h3>
            <p>Built on raw TCP sockets for zero-overhead data transfer.</p>
        </div>
        <div class="feature-card">
            <h3>Secure</h3>
            <p>Traffic is filtered through a rigorous custom proxy firewall.</p>
        </div>
    </div>
</body>
</html>
